
This image will only load when the word 'passkey' is entered into the field and submitted, and the encrypted file is uploaded

<div>
    <textarea id="passkey"></textarea>
    <button id="submit" onclick="fjor()">submit</button>
</div>
<div>
  <input type="file" id="fileInput">
</div>

<div>
    <img id="dynamicimg" src="">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
<script>
    function fjor() {
        String.prototype.hashCode = function() {
            var hash = 0, i, chr;
            if (this.length === 0) return hash;
            for (i = 0; i < this.length; i++) {
                chr = this.charCodeAt(i);
                hash = ((hash << 5) - hash) + chr;
                hash |= 0;
            }
            return hash;
        }

        var code = document.getElementById( 'passkey' ).value;
        console.info( 'hash ' + code.hashCode() )

        switch ( code.hashCode() ) {
            case 2038394109:
                console.info( 'triggered' )
                const fileInput = document.getElementById('fileInput');
                const file = fileInput.files[0];
                document.getElementById( 'dynamicimg' ).src = "data:image/png;base8," + decryptFile( file, code );
        }

    }

    function decryptFile( file, key ) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const fileContent = event.target.result;

            console.info( 'filecontent ' + fileContent )

            const decryptedData = CryptoJS.AES.decrypt(fileContent, key)
            console.info( 'decrypteddata ' + decryptedData )
            document.getElementById( 'dynamicimg' ).src = "data:image/png;base64," + decryptedData.toString(CryptoJS.enc.Base64);
        };
        reader.readAsText(file, 'utf-8');
    }
</script>
