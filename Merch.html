<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
h1 {font-family: Arial; text-align: center;}
p {font-family: Arial; text-align: center;}
div {font-family: Arial; text-align: center;}
img {
  display: block;
  margin: auto;
  width: 50%;
}

.centor {
  display: flex;
  justify-content: center;
  align-items: center;
  }
animatedp {
  font-family: monospace;
  font-style: italic;
  font-size: 80px;
  animation: color-change 1s infinite;
  text-align: middle;
}

@keyframes color-change {
  0% { color: green; }
  50% { color: orange; }
  100% { color: green; }

}

.pixelated {
  image-rendering: pixelated;
}
.container {
  display: grid;
  grid-template-columns: auto auto auto;
  background-color: #EBBA34;
  padding: 25px;
  gap: 5px;
}

.container div {
  background-color: #f1f1f1;
  color: #000;
  padding: 10px;
  font-size: 30px;
  text-align: center;
  border-radius: 25px;
}
</style>

<body>
<body style="background-color:#ebba34;">
<animatedp class="centor">
	
	MERCH
	
</animatedp>
<p>MERCH STORE OPENING SOON! I PROMIIIISEEEE!</p>
<p><a href="index.html">Home</a></p>
<p style="font-size: 40px">ERROR 404... even Faxy couldn't find this!</p>
<img class="pixelated" src="Error404.png" alt="FaxyError" style="width:540px;height:540px;">

</div>
</body>
</html>
