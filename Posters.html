<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
h1 {font-family: Arial; text-align: center;}
p {font-family: Arial; text-align: center;}
div {font-family: Arial; text-align: center;}
img {
  display: block;
  margin: auto;
  width: 50%;
}

.centor {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 100px;
  }
animatedp {
  font-family: monospace;
  font-style: italic;
  font-size: 80px;
  animation: color-change 1s infinite;
  text-align: middle;
}

@keyframes color-change {
  0% { color: pink; }
  50% { color: purple; }
  100% { color: pink; }

}

.pixelated {
  image-rendering: pixelated;
}
.container {
  display: grid;
  grid-template-columns: auto auto auto;
  background-color: #EBBA34;
  padding: 25px;
  gap: 5px;
}

.container div {
  background-color: #f1f1f1;
  color: #000;
  padding: 10px;
  font-size: 30px;
  text-align: center;
  border-radius: 25px;
}
.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100px;
  }
  .merch {
  text-align:center;
  padding:40px;
  background-color:lightblue;
  font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}
</style>

<body>
<body style="background-color:#ebba34;">
<animatedp class="centor">
	
	EPISODE POSTERS
	
</animatedp>
<p><a href="index.html">Home</a></p>
</p>
<p style="font-size: 15px">Check out our selection of episode posters! You can download them if you like!</p>
<p style="font-size: 15px">Not all of them are here right now we've currently lost a few down the sofa- don't worry we'll find them!</p>
<div class="container">
	<img src="Posters/S1Ep1.png" alt="S1Ep1Poster" style="width:540px;height:675px;"/>
	<img src="Posters/S1Ep2.png" alt="S1Ep2Poster" style="width:540px;height:675px;"/>
	<img src="Posters/S1Ep3.png" alt="S1Ep3Poster" style="width:540px;height:675px;"/>
	<img src="Posters/S1Ep4.png" alt="S1Ep4Poster" style="width:540px;height:675px;"/>
	<img src="Posters/S1Ep5.png" alt="S1Ep5Poster" style="width:540px;height:675px;"/>
	<img src="Posters/S1Ep7.png" alt="S1Ep7Poster" style="width:540px;height:675px;"/>
</div>
<audio loop id="ditty" src="Shopping.mp3" type="audio/mpeg">
</body>
</html>
